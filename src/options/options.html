<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="options.css" rel="stylesheet">
    <title>ChromePilot Settings</title>
</head>
<body>
<div class="container">
    <h1 class="title">ChromePilot Settings</h1>

    <div class="field">
        <label for="presetSelect">Provider Preset</label>
        <select id="presetSelect">
            <option value="">-- Select a preset --</option>
            <optgroup label="Paid">
                <option value="claude">Claude (Anthropic)</option>
                <option value="openai">OpenAI</option>
                <option value="copilot">GitHub Copilot (GPT-4o)</option>
                <option value="copilot-mini">GitHub Copilot (GPT-4o-mini)</option>
                <option value="copilot-llama">GitHub Copilot (Llama 3.1 70B)</option>
                <option value="copilot-mistral">GitHub Copilot (Mistral Small)</option>
            </optgroup>
            <optgroup label="Free">
                <option value="groq">Groq (Free)</option>
                <option value="together">Together AI (Free tier)</option>
                <option value="openrouter">OpenRouter (Free models)</option>
                <option value="cerebras">Cerebras (Free)</option>
                <option value="siliconflow">SiliconFlow 硅基流动 (Free)</option>
            </optgroup>
            <optgroup label="Local">
                <option value="ollama">Ollama (Local)</option>
            </optgroup>
            <option value="custom">Custom</option>
        </select>
    </div>

    <div class="field">
        <label for="providerSelect">Provider Format</label>
        <select id="providerSelect">
            <option value="openai">OpenAI-compatible</option>
            <option value="anthropic">Anthropic</option>
        </select>
    </div>

    <div class="field">
        <label for="baseUrlInput">API Base URL</label>
        <input id="baseUrlInput" placeholder="https://api.openai.com" type="text">
    </div>

    <div class="field">
        <label for="apiKeyInput">API Key</label>
        <input id="apiKeyInput" placeholder="Enter your API key (optional for local)" type="password">
    </div>

    <div class="field">
        <label for="modelInput">Model</label>
        <input id="modelInput" placeholder="e.g. gpt-4o, claude-sonnet-4-20250514, llama3" type="text">
    </div>

    <div class="button-group">
        <button id="saveBtn" type="button">Save</button>
        <button class="secondary" id="testBtn" type="button">Test Connection</button>
    </div>

    <div class="status" id="status"></div>
</div>
<script src="options.js"></script>
</body>
</html>
